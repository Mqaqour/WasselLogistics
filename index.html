<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/assets/Wassel logo-01.png" />
    <title>Wassel Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              wassel: {
                blue: '#002B49',
                yellow: '#FFCD00',
                darkBlue: '#001A2F',
                lightYellow: '#FFD733',
              },
              corp: {
                primary: '#3D3D3D',
                secondary: '#FFCD00',
                dark: '#262626'
              }
            },
            fontFamily: {
              sans: ['"IBM Plex Sans Arabic"', '"IBM Plex Sans"', 'system-ui', 'sans-serif'],
              arabic: ['"IBM Plex Sans Arabic"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Default site font: IBM Plex Sans Arabic covers both Arabic and Latin glyphs gracefully. */
      body {
        font-family: 'IBM Plex Sans Arabic', 'IBM Plex Sans', system-ui, sans-serif;
      }

      /* ARABIC FONT OVERRIDES */
      html[lang="ar"] body,
      html[lang="ar"] .font-sans,
      html[lang="ar"] * {
        font-family: 'IBM Plex Sans Arabic', sans-serif !important;
      }

      /* Custom scrollbar for chat */
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Animations */
      .animate-enter {
        animation: enter 0.4s ease-out forwards;
      }
      
      .animate-slide-up {
        animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(20px);
      }

      .animate-slide-in-right {
        animation: slideInRight 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateX(-10px);
      }
      
      .animate-pop {
        animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        opacity: 0;
        transform: scale(0.9);
      }

      @keyframes enter {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideInRight {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @keyframes pop {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      /* Animation Delays */
      .delay-75 { animation-delay: 75ms; }
      .delay-100 { animation-delay: 100ms; }
      .delay-150 { animation-delay: 150ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }
      .delay-600 { animation-delay: 600ms; }
      .delay-700 { animation-delay: 700ms; }

      /* ===== Animated Service Icons ===== */
      .asi-wrap { overflow: visible; }
      .asi-wheel    { transform-origin: center; transform-box: fill-box; animation: asi-spin 1.6s linear infinite; }
      .asi-truck    { animation: asi-bob 1.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .asi-dash     { stroke-dasharray: 6 8; animation: asi-dash 0.9s linear infinite; }
      .asi-plane    { animation: asi-fly 3.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .asi-cloud    { animation: asi-drift 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .asi-cloud-2  { animation: asi-drift 5s ease-in-out infinite reverse; transform-box: fill-box; transform-origin: center; }
      .asi-bag      { animation: asi-bob 1.4s ease-in-out infinite; transform-box: fill-box; transform-origin: top center; }
      .asi-spark    { animation: asi-twinkle 1.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .asi-spark.d1 { animation-delay: .4s; }
      .asi-spark.d2 { animation-delay: .8s; }
      .asi-shimmer  { animation: asi-shimmer 2.4s linear infinite; }
      .asi-globe    { animation: asi-spin 6s linear infinite; transform-box: fill-box; transform-origin: center; }
      .asi-orbit    { animation: asi-spin 4s linear infinite reverse; transform-box: fill-box; transform-origin: center; }
      .asi-doc      { animation: asi-flip 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: left center; }
      .asi-shield   { animation: asi-pulse 2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
      .asi-check    { stroke-dasharray: 24; stroke-dashoffset: 24; animation: asi-draw 2s ease-in-out infinite; }

      @keyframes asi-spin    { to { transform: rotate(360deg); } }
      @keyframes asi-bob     { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.5px); } }
      @keyframes asi-dash    { to { stroke-dashoffset: -28; } }
      @keyframes asi-fly     { 0%,100% { transform: translate(0,0) rotate(-8deg); } 50% { transform: translate(2px,-2px) rotate(-4deg); } }
      @keyframes asi-drift   { 0%,100% { transform: translateX(0); } 50% { transform: translateX(3px); } }
      @keyframes asi-twinkle { 0%,100% { opacity: .2; transform: scale(.7); } 50% { opacity: 1; transform: scale(1.1); } }
      @keyframes asi-shimmer { 0% { transform: translateX(-120%); } 100% { transform: translateX(220%); } }
      @keyframes asi-flip    { 0%,100% { transform: rotateY(0deg); } 50% { transform: rotateY(35deg); } }
      @keyframes asi-pulse   { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
      @keyframes asi-draw    { 0% { stroke-dashoffset: 24; } 50%,100% { stroke-dashoffset: 0; } }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3"
  }
}
</script>
</head>
